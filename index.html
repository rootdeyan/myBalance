  <style>

      --radius: 14px;

    .container { max-width: 720px; margin: 0 auto; }

    .theme-toggle:active { transform: scale(0.95); }

      margin-bottom: 1.4rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    input, select, button {
      padding: 8px 10px;
      border-radius: 8px;

      line-height: 1.2;
      transition: all 0.2s ease;

      border: 2px solid transparent;
      background-origin: padding-box;
    }
    
    #type:hover {
      transform: translateY(-2px);
    }

    #type:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .income-select {
      background-color: var(--income-bg);
      border-color: var(--income);
      color: var(--income);
    }
    
    [data-theme="light"] .income-select {

    }

    [data-theme="light"] .income-select:hover { background-color: rgba(16, 185, 129, 0.3); }
    
    .expense-select {
      background-color: var(--expense-bg);
      border-color: var(--expense);
      color: var(--expense);
    }
    
    [data-theme="light"] .expense-select {

      color: #b91c1c;
    }
    
    .expense-select:hover { background-color: rgba(248, 113, 113, 0.15); }
    [data-theme="light"] .expense-select:hover { background-color: rgba(239, 68, 68, 0.3); }
    
    #type option {
      background: var(--surface);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    
    #type option:checked {
      background: linear-gradient(var(--primary), var(--primary));
      background-color: var(--primary) !important;
      color: white;
    }
    
    .desc-field { flex: 1 1 100%; }
    .amount-field { flex: 1 1 100px; }
    .type-field { flex: 1 1 90px; }

    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      align-items: center;

      flex-wrap: wrap;
      margin-top: 16px;

    }
    .month-tab {
      padding: 8px 14px;
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid var(--primary);

      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text);
    }
    .month-tab:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }
    .month-tab.active {
      background: var(--primary);
      color: white;
    }
    .month-dropdown-wrapper {
      position: relative;
    }
    .month-dropdown-btn {

    }
    .month-dropdown-btn:hover {
      background: var(--primary);

    }
    .month-dropdown {
      position: absolute;

      overflow-y: auto;

    }
    .month-dropdown.show {
      display: block;
    }
    .month-dropdown-group {
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
    }
    .month-dropdown-group:last-child {
      border-bottom: none;
    }
    .month-dropdown-group-title {
      padding: 8px 14px;

      font-size: 0.85rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .month-dropdown-item {
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--text);
      font-size: 0.9rem;
    }
    .month-dropdown-item:hover {
      background: rgba(96, 165, 250, 0.1);
      padding-left: 18px;
    }
    .month-dropdown-item.active {
      background: rgba(96, 165, 250, 0.2);
      color: var(--primary);
      font-weight: 600;
    }
    .month-header {
      padding: 10px 14px;
      background: #1e2238;
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      font-size: 1.05rem;
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .month-header { background: #e5e7eb; }

    .negative { color: var(--expense); }

      text-align: center;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════
       RESTYLE — Deep Indigo Finance
    ═══════════════════════════════════════ */

    /* Body & layout */
    body { padding: 16px; transition: background 0.3s, color 0.3s; }
    .container { max-width: 680px; }

    /* Header */
    header { align-items: flex-start; margin-bottom: 1.4rem; }

      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #a78bfa 100%);

      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.45rem;
      letter-spacing: -0.5px;
    }
    .live-date {
      font-size: 0.7rem;
      color: var(--text2);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .header-meta { display: flex; align-items: center; gap: 8px; }

    /* Theme toggle */
    .theme-toggle {
      background: var(--surface);
      width: 36px; height: 36px;
      border-radius: 10px;
    }
    .theme-toggle:hover { background: var(--primary); border-color: var(--primary); color: white; transform: none; }
    .theme-toggle:active { transform: scale(0.9); }

    /* Form */
    .form { border-radius: var(--radius); box-shadow: 0 4px 30px rgba(0,0,0,0.25); }
    input, select { border-radius: 10px; }
    input:focus, select:focus {
      border-color: var(--primary);
    }
    /* Add button — gradient */
    #add {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      font-weight: 700;
      letter-spacing: 0.3px;
      border: none;
    }
    #add:hover { opacity: 0.9; transform: translateY(-1px); }
    [data-theme="light"] #add { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
    /* Menu button */
    #menu-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      min-width: 38px; width: 38px; padding: 0;
    }
    #menu-btn:hover { background: var(--primary); border-color: var(--primary); color: white; transform: none; }
    .menu-dropdown { border-radius: 12px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .menu-dropdown.show { animation: dropIn 0.15s ease; }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .menu-item { font-size: 0.87rem; border-radius: 0; }
    .menu-item:hover { background: rgba(99,102,241,0.1); color: var(--primary); }

    }

    /* ── Summary panel ── */
    .summary-panel { gap: 10px; margin-bottom: 14px; }

    /* Summary card — glass look + coloured top stripe */
    .summary-item {
      border-radius: var(--radius);

      overflow: hidden;

      align-items: center;
      gap: 8px;

    .summary-amounts { text-align: right; }

      content: '';

      border-radius: var(--radius) var(--radius) 0 0;
    }
    .summary-item.income-summary::before  { background: linear-gradient(90deg, var(--income), transparent); }
    .summary-item.expense-summary::before { background: linear-gradient(90deg, var(--expense), transparent); }
    .summary-item.carry-summary::before   { background: linear-gradient(90deg, var(--carry), transparent); }

<script>
// Configuration & Constants
const CONFIG = {
  STORAGE_KEY: 'salary-tracker-monthly-v3',
  THEME_KEY: 'salary-tracker-theme',
  EUR_TO_BGN: 1.95583,
  MAX_DESC_LENGTH: 100,
  MAX_AMOUNT: 999999.99,
  MIN_AMOUNT: 0.01,
  RATE_LIMIT_MS: 300,
  MAX_TRANSACTIONS_PER_MONTH: 1000,
  DEBOUNCE_DELAY: 500,
  SESSION_TIMEOUT_MS: 3600000 // 1 hour
};

// Module-level ref to the month navigation dropdown (set during render)
let _monthDropdownEl = null;

// State Management
const STATE = {
  months: (() => { try { return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '{}') || {}; } catch { return {}; } })(),
  editing: null,
  selectedMonth: null,
  lastActionTime: Date.now(),
  sessionId: Math.random().toString(36).substr(2, 9),
  renderTimeout: null
};

// Utility: Rate Limiting & Security
const Security = {
  checkRateLimit() {
    const now = Date.now();
    if (now - STATE.lastActionTime < CONFIG.RATE_LIMIT_MS) {
      console.warn('Rate limit exceeded');
      return false;
    }
    STATE.lastActionTime = now;
    return true;
  },
  
  validateInput(desc, amt, type) {
    if (!desc || typeof desc !== 'string') return false;
    if (desc.trim().length === 0 || desc.length > CONFIG.MAX_DESC_LENGTH) return false;
    const amount = Number(amt);
    if (isNaN(amount) || amount < CONFIG.MIN_AMOUNT || amount > CONFIG.MAX_AMOUNT) return false;
    if (!['income', 'expense'].includes(type)) return false;
    return true;
  },
  
  sanitizeInput(str) {
    if (typeof str !== 'string') return '';
    return str.slice(0, CONFIG.MAX_DESC_LENGTH)
      .replace(/[<>]/g, '')
      .trim();
  },
  
  checkDataIntegrity() {
    const txCount = Object.values(STATE.months).reduce((sum, m) => sum + (m.tx?.length || 0), 0);
    return txCount <= CONFIG.MAX_TRANSACTIONS_PER_MONTH * Object.keys(STATE.months).length;
  }
};

// Utility: Date & Formatting
const Formatter = {
  getMonthKey(d = new Date()) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  },
  
  formatDate(timestamp) {
    try {
      return new Date(timestamp).toLocaleString('bg-BG', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).replace(',', '');
    } catch {
      return 'Invalid Date';
    }
  },
  
  formatCurrency(amount, currency = 'EUR') {
    return `${amount >= 0 ? '+' : ''}${Number(amount).toFixed(2)} ${currency}`;
  },
  
  convertToBGN(eur) {
    return (eur * CONFIG.EUR_TO_BGN).toFixed(2);
  }
};

// Data Management
const DataManager = {
  save() {
    if (!Security.checkDataIntegrity()) {
      console.error('Data integrity check failed');
      return false;
    }
    try {
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(STATE.months));
      this.showIndicator('Saved', 'success');
      return true;
    } catch (e) {
      console.error('Storage error:', e);
      this.showIndicator('Save failed', 'error');
      return false;
    }
  },
  
  getOrCreateMonth(key) {
    if (!STATE.months[key]) {
      let carry = 0;
      const [y, m] = key.split('-').map(Number);
      let py = y, pm = m - 1;
      if (pm === 0) { pm = 12; py--; }
      const pk = `${py}-${String(pm).padStart(2, '0')}`;
      if (STATE.months[pk]) {
        carry = STATE.months[pk].carry + STATE.months[pk].income - STATE.months[pk].expense;
      }
      STATE.months[key] = { income: 0, expense: 0, carry, tx: [] };
    }
    return STATE.months[key];
  },
  
  // Recompute income/expense from the transaction list — the single source of truth.
  // Eliminates floating-point drift from incremental +=/-= operations.
  _recalcTotals(m) {
    m.income = 0;
    m.expense = 0;
    m.tx.forEach(t => {
      if (t.type === 'income') m.income += t.amt;
      else m.expense += t.amt;
    });
  },

  addTransaction(desc, amt, type) {
    if (!Security.validateInput(desc, amt, type) || !Security.checkRateLimit()) return false;
    desc = Security.sanitizeInput(desc);
    const key = Formatter.getMonthKey();
    const m = this.getOrCreateMonth(key);
    m.tx.unshift({ desc, amt: Number(amt), type, ts: Date.now() });
    this._recalcTotals(m);
    return this.save();
  },

  updateTransaction(monthKey, idx, desc, amt, type) {
    if (!Security.validateInput(desc, amt, type) || !Security.checkRateLimit()) return false;
    desc = Security.sanitizeInput(desc);
    const m = STATE.months[monthKey];
    if (!m || !m.tx[idx]) return false;
    m.tx[idx] = { desc, amt: Number(amt), type, ts: Date.now() };
    this._recalcTotals(m);
    return this.save();
  },

  deleteTransaction(k, i) {
    if (!Security.checkRateLimit()) return false;
    const m = STATE.months[k];
    if (!m || !m.tx[i]) return false;
    m.tx.splice(i, 1);
    this._recalcTotals(m);
    return this.save();
  },
  
  refreshCarry(key) {
    const m = STATE.months[key];
    if (!m) return;
    const [y, mo] = key.split('-').map(Number);
    let py = y, pm = mo - 1;
    if (pm === 0) { pm = 12; py--; }
    const pk = `${py}-${String(pm).padStart(2, '0')}`;
    if (STATE.months[pk]) {
      const prev = STATE.months[pk];
      m.carry = prev.carry + prev.income - prev.expense;
    }
  },

  // Walk all months in chronological order so each month's carry is derived
  // from an already-correct previous month. Call before export and after import.
  refreshAllCarries() {
    Object.keys(STATE.months).sort().forEach(key => this.refreshCarry(key));
  },

  showIndicator(msg, type = 'info') {
    const ind = document.getElementById('indicator');
    if (ind) {
      ind.textContent = msg;
      ind.className = `indicator show ${type}`;
      setTimeout(() => ind.classList.remove('show'), 2000);
    }
  }
};

// UI Rendering
const UI = {
  render() {
    clearTimeout(STATE.renderTimeout);
    STATE.renderTimeout = setTimeout(() => this._doRender(), 100);
  },
  
  _doRender() {
    const realCk = Formatter.getMonthKey();
    DataManager.refreshCarry(realCk);
    if (STATE.selectedMonth && STATE.selectedMonth !== realCk) {
      DataManager.refreshCarry(STATE.selectedMonth);
    }
    this.renderSummary();
    this.renderMonths();
    document.getElementById('add').textContent = STATE.editing ? 'Save Edit' : 'Add';
  },
  
  renderSummary() {
    const ck = STATE.selectedMonth || Formatter.getMonthKey();
    const currentMonth = STATE.months[ck];

    if (!currentMonth) {
      document.getElementById('summary').innerHTML = '';
      return;
    }

    const carry   = currentMonth.carry;
    const income  = currentMonth.income;
    const expense = currentMonth.expense;
    const balance = carry + income - expense;

    const bgnCarry   = Formatter.convertToBGN(Math.abs(carry));
    const bgnIncome  = Formatter.convertToBGN(income);
    const bgnExpense = Formatter.convertToBGN(expense);
    const bgnBalance = Formatter.convertToBGN(Math.abs(balance));

    // Spending ring & bar: expense as % of available funds
    const available  = carry + income;
    const spendPct   = available > 0 ? Math.min((expense / available) * 100, 100) : 0;
    const ringDash   = spendPct.toFixed(1);
    const barColor   = spendPct < 50 ? '#10b981' : spendPct < 80 ? '#f59e0b' : '#ef4444';

    const balanceClass = balance < 0 ? 'balance-negative' : 'balance-summary';
    // Balance spans full width when no carry card (keeps 2-col grid clean)

        <div class="summary-item carry-summary">
          <div class="summary-label">Carried Over</div>
          <div class="summary-amounts">
            <div class="summary-value">${carry >= 0 ? '+' : ''}${carry.toFixed(2)} €</div>
            <div class="summary-bgn">≈ ${bgnCarry} BGN</div>

    document.getElementById('summary').innerHTML = `
      <div class="summary-panel">
        <div class="summary-item income-summary">
          <div class="summary-label">Income</div>
          <div class="summary-amounts">

          <div class="summary-amounts">
            <div class="summary-value">-${expense.toFixed(2)} €</div>
            <div class="summary-bgn">≈ ${bgnExpense} BGN</div>
          </div>
        </div>

        <div class="summary-item ${balanceClass}"${balanceSpan}>
          <div class="summary-label">Balance</div>
          <div class="summary-amounts">
            <div class="summary-value">${balance >= 0 ? '+' : ''}${balance.toFixed(2)} €</div>
            <div class="summary-bgn">≈ ${bgnBalance} BGN</div>
          </div>
        </div>
        <div class="summary-spend-row">
          <div class="spend-ring-wrap">
            <svg class="spend-ring" viewBox="0 0 36 36">
              <path class="spend-ring-track" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
              <path class="spend-ring-fill" id="spend-ring-fill" stroke="${barColor}" stroke-dasharray="0,100"

            </svg>
            <div class="spend-ring-label" id="spend-ring-label">0%</div>
          </div>
          <div class="spend-bar-info">
            <div class="spend-bar-title">Spending Overview</div>

              <span>${spendPct.toFixed(0)}% of available spent</span>
              <span>${expense.toFixed(2)} / ${available.toFixed(2)} €</span>
            </div>
          </div>
        </div>
      </div>`;

    // Animate ring and bar in after first paint
    requestAnimationFrame(() => {
      const fill  = document.getElementById('spend-bar-fill');
      const ring  = document.getElementById('spend-ring-fill');
      const label = document.getElementById('spend-ring-label');
      if (fill)  fill.style.width = spendPct + '%';

  renderMonths() {
    const c = document.getElementById('months');
    c.innerHTML = '';
    const keys = Object.keys(STATE.months).sort().reverse();
    const realCk = Formatter.getMonthKey(); // actual current calendar month
    const displayKey = STATE.selectedMonth || realCk; // month whose data to display

      });

      dropdownBtn.onclick = (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('show');
      };

      dropdownWrapper.appendChild(dropdownBtn);
      dropdownWrapper.appendChild(dropdown);
      selector.appendChild(dropdownWrapper);
    } else {
      _monthDropdownEl = null;
    }

    c.appendChild(selector);

    // Render the selected/displayed month's transactions
    const displayData = STATE.months[displayKey];
    if (displayData) {
      const monthContainer = document.createElement('div');
      monthContainer.className = 'month';

      l.className = 'transactions-list';

        const cr = document.createElement('div');
        cr.className = 'carry-banner';
        const bgnCarry = Formatter.convertToBGN(Math.abs(displayData.carry));
        cr.innerHTML = `
          <div class="carry-banner-left">
            <span class="carry-banner-icon">↩</span>
            <span>Carried from previous month</span>
          </div>
          <div class="carry-banner-right">
            <div class="carry-banner-eur">${displayData.carry >= 0 ? '+' : ''}${displayData.carry.toFixed(2)} €</div>
            <div class="carry-banner-bgn">≈ ${bgnCarry} BGN</div>
          </div>`;
        l.appendChild(cr);
      }

      if (displayData.tx.length === 0 && displayData.carry === 0) {
        const e = document.createElement('div');
        e.className = 'empty-month';
        e.textContent = 'No transactions this month';
        l.appendChild(e);
      } else {
        displayData.tx.forEach((t, i) => {
          const r = document.createElement('div');
          r.className = `row ${t.type}-row`;
          const dateStr = Formatter.formatDate(t.ts);
          const bgnAmt = Formatter.convertToBGN(t.amt);
          r.innerHTML = `
            <div>
              <div class="desc">${this.escapeHtml(t.desc)}</div>
              <div class="meta">${dateStr}</div>
            </div>
            <div>
              <div class="amt ${t.type}">${t.type === 'income' ? '+' : '-'}${Number(t.amt).toFixed(2)} €</div>
              <div class="bgn">≈ ${bgnAmt} BGN</div>
            </div>
            <div class="actions">
              <button class="btn-small btn-edit" onclick="UI.startEdit('${displayKey}',${i})" title="Edit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
              <button class="btn-small btn-delete" onclick="UI.removeTx('${displayKey}',${i})" title="Delete">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>`;

        });
      }

      monthContainer.appendChild(l);
      c.appendChild(monthContainer);
    }

    document.getElementById('add').textContent = STATE.editing ? 'Save Edit' : 'Add';
  },
  
  switchMonth(monthKey) {
    STATE.selectedMonth = monthKey;
    UI.render();
  },
  
  escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  },
  
  startEdit(monthKey, idx) {
    if (!Security.checkRateLimit()) return;
    const t = STATE.months[monthKey]?.tx[idx];
    if (!t) return;
    
    document.getElementById('desc').value = t.desc;
    document.getElementById('amount').value = t.amt;
    document.getElementById('type').value = t.type;
    this.updateTypeSelect(t.type);
    STATE.editing = { monthKey, idx };
    this.render();
  },
  
  removeTx(k, i) {
    if (!confirm('Delete this transaction?')) return;
    if (DataManager.deleteTransaction(k, i)) {
      this.clearForm();
      this.render();
    }
  },
  
  clearForm() {
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('type').value = 'income';
    this.updateTypeSelect('income');
    STATE.editing = null;
  },
  
  updateTypeSelect(type) {
    const sel = document.getElementById('type');
    sel.classList.remove('income-select', 'expense-select');
    sel.classList.add(`${type}-select`);
  },
  
  addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amt = document.getElementById('amount').value;
    const type = document.getElementById('type').value;
    
    if (!desc || !amt) return;
    
    const success = STATE.editing
      ? DataManager.updateTransaction(STATE.editing.monthKey, STATE.editing.idx, desc, amt, type)
      : DataManager.addTransaction(desc, amt, type);
    
    if (success) {
      this.clearForm();
      this.render();
    }
  }
};

// Theme Management
const Theme = {
  init() {
    // Use stored preference; if none, follow the OS/device setting
    const stored = localStorage.getItem(CONFIG.THEME_KEY);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const currentTheme = stored || (prefersDark ? 'dark' : 'light');
    this.apply(currentTheme);

    document.getElementById('theme-toggle').addEventListener('click', () => this.toggle());
    document.getElementById('auto-theme-btn').addEventListener('click', () => this.toggleAuto());
    document.getElementById('type').addEventListener('change', (e) => UI.updateTypeSelect(e.target.value));

    // Follow OS theme changes in real time — only when the user hasn't set a manual preference
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem(CONFIG.THEME_KEY)) {
        this.apply(e.matches ? 'dark' : 'light');
        this.updateAutoBtn();
      }
    });

    this.updateAutoBtn();
  },

  apply(theme) {
    document.body.setAttribute('data-theme', theme);
    this.updateToggleIcon(theme);
  },

  toggle() {
    const current = document.body.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    // Storing a manual preference overrides the OS setting from this point on
    localStorage.setItem(CONFIG.THEME_KEY, newTheme);
    this.apply(newTheme);
    this.updateAutoBtn();
  },

  isAuto() {
    return !localStorage.getItem(CONFIG.THEME_KEY);
  },

  toggleAuto() {
    if (this.isAuto()) {
      // Lock in the currently-displayed theme as a manual preference
      localStorage.setItem(CONFIG.THEME_KEY, document.body.getAttribute('data-theme'));
    } else {
      // Remove the manual lock and follow the OS again
      localStorage.removeItem(CONFIG.THEME_KEY);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      this.apply(prefersDark ? 'dark' : 'light');
    }
    this.updateAutoBtn();
  },

  updateAutoBtn() {
    const btn = document.getElementById('auto-theme-btn');
    if (!btn) return;
    if (this.isAuto()) {
      btn.classList.add('auto-active');
      btn.title = 'Auto theme ON — follows your device (click to disable)';
    } else {
      btn.classList.remove('auto-active');
      btn.title = 'Auto theme OFF — click to follow device theme';
    }
  },
  
  updateToggleIcon(theme) {
    const btn = document.getElementById('theme-toggle');
    if (theme === 'dark') {
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      `;
    } else {
      btn.innerHTML = `

          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

// Export/Import Management
const FileManager = {
  exportToTxt() {
    try {
      DataManager.refreshAllCarries(); // ensure every month's carry is up-to-date
      const data = STATE.months;
      let txtContent = 'SALARY TRACKER BACKUP - ' + new Date().toLocaleString() + '\n';
      txtContent += '=' .repeat(50) + '\n\n';
      
      const keys = Object.keys(data).sort();
      keys.forEach(monthKey => {
        const m = data[monthKey];
        const final = m.carry + m.income - m.expense;
        const bgnTotal = Formatter.convertToBGN(final);
        
        txtContent += `MONTH: ${monthKey}\n`;
        txtContent += '-' .repeat(40) + '\n';
        txtContent += `Carry from previous: ${m.carry.toFixed(2)} €\n`;
        txtContent += `Total Income: ${m.income.toFixed(2)} €\n`;
        txtContent += `Total Expense: ${m.expense.toFixed(2)} €\n`;
        txtContent += `Final Balance: ${final.toFixed(2)} € (≈ ${bgnTotal} BGN)\n\n`;
        
        txtContent += 'TRANSACTIONS:\n';
        if (m.tx.length === 0) {
          txtContent += '  (No transactions)\n';
        } else {
          m.tx.forEach(t => {
            const dateStr = Formatter.formatDate(t.ts);
            const bgnAmt = Formatter.convertToBGN(t.amt);
            const sign = t.type === 'income' ? '+' : '-';
            txtContent += `  [${dateStr}|${t.ts}] ${sign}${t.amt.toFixed(2)} € (≈ ${bgnAmt} BGN) - ${t.type.toUpperCase()} - ${t.desc}\n`;
          });
        }
        txtContent += '\n' + '='.repeat(50) + '\n\n';
      });
      
      // Create and download file
      const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const year = String(now.getFullYear()).slice(-2);
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      link.download = `ST-${month}-${day}-${year}_${hours}.${minutes}.${seconds}.txt`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      
      DataManager.showIndicator('Data exported successfully', 'success');
    } catch (e) {
      console.error('Export error:', e);
      DataManager.showIndicator('Export failed', 'error');
    }
  },
  
  importFromTxt(file) {
    try {
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        const importedData = this.parseTxtContent(content);
        
        if (!importedData || Object.keys(importedData).length === 0) {
          DataManager.showIndicator('Invalid file format', 'error');
          return;
        }
        
        const choice = confirm('Replace all data with imported data?\n\nOK = Replace\nCancel = Merge');
        
        if (choice) {
          // REPLACE - completely replace all data
          STATE.months = importedData;
        } else {
          // MERGE - merge imported with existing
          Object.keys(importedData).forEach(monthKey => {
            const imported = importedData[monthKey];
            const existing = STATE.months[monthKey];

            if (!existing) {
              STATE.months[monthKey] = imported;
            } else {
              // Merge transactions (skip exact duplicates)
              const existingTxs = existing.tx || [];
              const importedTxs = imported.tx || [];
              importedTxs.forEach(iTx => {
                const isDuplicate = existingTxs.some(eTx =>
                  eTx.ts === iTx.ts && eTx.amt === iTx.amt && eTx.type === iTx.type && eTx.desc === iTx.desc
                );
                if (!isDuplicate) existingTxs.unshift(iTx);
              });
              existing.tx = existingTxs;
            }
          });
        }

        // Always recalculate totals from the transaction list (source of truth)
        // and refresh the carry chain for every month — never trust file header values.
        Object.values(STATE.months).forEach(m => DataManager._recalcTotals(m));
        DataManager.refreshAllCarries();

        DataManager.save();
        UI.render();
        DataManager.showIndicator('Data imported successfully', 'success');
      };
      reader.readAsText(file);
    } catch (e) {
      console.error('Import error:', e);
      DataManager.showIndicator('Import failed', 'error');
    }
  },
  
  parseTxtContent(content) {
    try {
      const lines = content.split('\n');
      const data = {};
      let currentMonth = null;
      let currentTxs = [];
      let monthData = { income: 0, expense: 0, carry: 0 };
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        
        if (line.startsWith('MONTH:')) {
          // Save previous month if exists
          if (currentMonth) {
            data[currentMonth] = { ...monthData, tx: currentTxs };
          }

          // Start new month
          currentMonth = line.replace('MONTH:', '').trim();
          currentTxs = [];
          monthData = { income: 0, expense: 0, carry: 0 };
        } else if (line.startsWith('Carry from previous:')) {
          const match = line.match(/([-]?\d+\.?\d*)/);
          if (match) monthData.carry = parseFloat(match[1]);
        } else if (line.startsWith('Total Income:')) {
          const match = line.match(/([-]?\d+\.?\d*)/);
          if (match) monthData.income = parseFloat(match[1]);
        } else if (line.startsWith('Total Expense:')) {
          const match = line.match(/([-]?\d+\.?\d*)/);
          if (match) monthData.expense = parseFloat(match[1]);
        } else if (line.startsWith('[') && line.includes(']') && currentMonth) {
          // Parse transaction line with embedded timestamp
          const txMatch = line.match(/\[(.*?)\|(\d+)\]\s*([\+\-])(\d+\.?\d*)\s*€.*?-\s*(INCOME|EXPENSE)\s*-\s*(.*)/i);
          if (txMatch) {
            const [, dateStr, timestamp, sign, amount, type, desc] = txMatch;
            try {
              const ts = parseInt(timestamp);
              if (!isNaN(ts)) {
                currentTxs.push({
                  desc: desc.trim(),
                  amt: parseFloat(amount),
                  type: type.toLowerCase(),
                  ts: ts
                });
              }
            } catch (e) {
              console.warn('Could not parse transaction:', line);
            }
          }
        }
      }
      
      // Save last month
      if (currentMonth) {
        data[currentMonth] = { ...monthData, tx: currentTxs };
      }

      return data;
    } catch (e) {
      console.error('Parse error:', e);
      return null;
    }
  }
};

// Guide Tour
const Guide = {
  SEEN_KEY: 'salary-tracker-guide-seen',
  STEPS: [
    {
      sel: 'header',
      title: 'Welcome to myBalance €',
      body: 'Your personal finance tracker. Everything is stored locally in your browser — no account, no server, no data leaves your device.'
    },
    {
      sel: '.form',
      title: 'Add a Transaction',
      body: 'Type a description, enter an amount, choose Income or Expense, then click Add. You can edit or delete any entry later.'
    },
    {
      sel: '#summary',
      title: 'Monthly Summary',
      body: 'See your Income, Spent, Carried Over (balance rolled from previous months), and your current Balance — shown in EUR and BGN.'
    },
    {
      sel: '#months',
      title: 'Transactions & Months',
      body: 'All entries are grouped by month. Use the dropdown to switch months. Tap the pencil to edit or the bin to delete any transaction.'
    },
    {
      sel: '#menu-btn',
      title: 'Backup Your Data',
      body: 'Use the ⋯ menu to Download a .txt backup of all your data, or Upload one to restore or merge it back in.'
    }
  ],
  _step: 0,

  init() {
    document.getElementById('guide-btn').addEventListener('click', () => this.start());
    document.getElementById('guide-next').addEventListener('click', () => this.next());
    document.getElementById('guide-skip').addEventListener('click', () => this.skip());
    // Show automatically on the very first visit
    if (!localStorage.getItem(this.SEEN_KEY)) {
      setTimeout(() => this.start(), 500);
    }
  },

  start() {
    this._step = 0;
    this._show(0);
  },

  _show(n) {
    const step = this.STEPS[n];
    const target = document.querySelector(step.sel);

    document.getElementById('guide-title').textContent = step.title;
    document.getElementById('guide-body').textContent = step.body;
    document.getElementById('guide-counter').textContent = `${n + 1} / ${this.STEPS.length}`;
    document.getElementById('guide-next').textContent = n === this.STEPS.length - 1 ? 'Finish' : 'Next';

    const hl = document.getElementById('guide-highlight');
    const tt = document.getElementById('guide-tooltip');
    hl.style.display = 'block';
    tt.style.display = 'block';

    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    requestAnimationFrame(() => {
      const r = target.getBoundingClientRect();
      const pad = 6;
      hl.style.left   = (r.left - pad) + 'px';
      hl.style.top    = (r.top  - pad) + 'px';
      hl.style.width  = (r.width  + pad * 2) + 'px';
      hl.style.height = (r.height + pad * 2) + 'px';

      // Place tooltip below target; flip above if not enough room
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const gap = 14;
      const ttH = 150; // approximate tooltip height
      const maxW = Math.min(320, vw - 32);
      let top = r.bottom + pad + gap;
      if (top + ttH > vh - 16) {
        top = r.top - pad - gap - ttH;
        if (top < 16) top = 16;
      }
      let left = r.left;
      if (left + maxW > vw - 16) left = vw - maxW - 16;
      if (left < 16) left = 16;

      tt.style.top     = top  + 'px';
      tt.style.left    = left + 'px';
      tt.style.maxWidth = maxW + 'px';
    });
  },

  next() {
    this._step++;
    if (this._step >= this.STEPS.length) {
      this._finish();
    } else {
      this._show(this._step);
    }
  },

  skip() {
    this._finish();
  },

  _finish() {
    document.getElementById('guide-highlight').style.display = 'none';
    document.getElementById('guide-tooltip').style.display   = 'none';
    localStorage.setItem(this.SEEN_KEY, '1');
  }
};
